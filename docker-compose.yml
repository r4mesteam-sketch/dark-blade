version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: dark_blade_postgres
    environment:
      POSTGRES_USER: darkblade_user
      POSTGRES_PASSWORD: darkblade_password
      POSTGRES_DB: dark_blade_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U darkblade_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dark_blade_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: dark_blade_redis
    command: redis-server --appendonly yes --requirepass ""
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dark_blade_network

  # Bitcoin Testnet Node (optional, for local development)
  bitcoin:
    image: btcpayserver/bitcoin:24
    container_name: dark_blade_bitcoin
    command: >
      -regtest
      -server
      -rpcuser=bitcoin
      -rpcpassword=password
      -rpcallowip=0.0.0.0/0
      -zmqpubrawblock=tcp://0.0.0.0:28332
      -zmqpubrawtx=tcp://0.0.0.0:28333
    ports:
      - "18332:18332"
      - "18333:18333"
      - "28332:28332"
      - "28333:28333"
    volumes:
      - bitcoin_data:/data
    networks:
      - dark_blade_network
    profiles:
      - full

  # NestJS Backend
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: dark_blade_backend
    environment:
      DATABASE_URL: postgresql://darkblade_user:darkblade_password@postgres:5432/dark_blade_db
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
      BITCOIN_NETWORK: testnet
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - dark_blade_network
    profiles:
      - full

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: dark_blade_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - dark_blade_network
    profiles:
      - full

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: dark_blade_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - dark_blade_network
    profiles:
      - full

volumes:
  postgres_data:
  redis_data:
  bitcoin_data:

networks:
  dark_blade_network:
    driver: bridge
